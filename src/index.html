    <meta name="robots" content="index, follow" />

    <!-- OpenGraph -->
    <meta property="og:type"        content="website" />
    <meta property="og:site_name"   content="La Casa del Pintor" />
    <meta property="og:title"       content="La Casa del Pintor | Pinturas y Asesoría en Mocoa" />
    <meta property="og:description" content="Pinturería en Mocoa con amplia variedad de pinturas, herramientas y productos para hogar, construcción e industria." />
    <meta property="og:url"         content="https://lacasadelpintormocoa.com" />

    <!-- Twitter Card -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="La Casa del Pintor | Pinturas y Asesoría en Mocoa" />
    <meta name="twitter:description" content="Pinturería en Mocoa con amplia variedad de pinturas, herramientas y productos para hogar, construcción e industria." />
    <meta name="twitter:image"       content="https://lacasadelpintormocoa.com/assets/images/logo.jpg" />

    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <link rel="canonical" href="https://lacasadelpintormocoa.com" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Alegreya:ital,wght@0,400..900;1,400..900&family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700;12..96,800&family=Caveat:wght@400;600&family=Faster+One&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />

    <style>
      /* Iconos ocultos hasta que la fuente cargue */
      .material-symbols-outlined {
        visibility: hidden;
        /* Tamaño fijo: evita que el texto largo desplace el layout */
        display: inline-block;
        overflow: hidden;
        width: 1em;
        height: 1em;
        vertical-align: middle;
      }
      html.fonts-ready .material-symbols-outlined {
        visibility: visible;
        width: auto;
        height: auto;
        overflow: visible;
      }

      /* Loader global — cubre hasta que las fuentes carguen */
      #app-loader {
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #faf8f3;
        transition: opacity 0.25s ease;
      }
      #app-loader.hidden {
        opacity: 0;
        pointer-events: none;
      }
      #app-loader__spinner {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border: 4px solid #efe9d6;
        border-top-color: #e23e57;
        animation: shell-spin 0.7s linear infinite;
      }
      @keyframes shell-spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <!-- Loader fuera de app-root: Angular no lo toca -->
    <div id="app-loader">
      <div id="app-loader__spinner"></div>
    </div>

    <app-root></app-root>

    <script>
      (function () {
        var loader = document.getElementById('app-loader');
        var done = false;

        function dismiss() {
          if (done) return;
          done = true;
          document.documentElement.classList.add('fonts-ready');
          if (loader) {
            loader.classList.add('hidden');
            setTimeout(function () {
              if (loader && loader.parentNode) loader.parentNode.removeChild(loader);
            }, 300);
          }
        }

        // Fallback máximo: 2.5 s
        var timeout = setTimeout(dismiss, 2500);

        // Espera específicamente Material Symbols Outlined (el que causa el flash)
        // document.fonts.load() espera a que el archivo woff2 descargue de verdad
        var fontReady = (typeof document.fonts !== 'undefined')
          ? document.fonts.load('400 24px "Material Symbols Outlined"')
              .then(function (faces) {
                // Si la fuente no estaba definida aún, caer a fonts.ready
                return faces.length > 0 ? Promise.resolve() : document.fonts.ready;
              })
          : Promise.resolve();

        fontReady
          .then(function () { clearTimeout(timeout); dismiss(); })
          .catch(function () { clearTimeout(timeout); dismiss(); });
      })();
    </script>
  </body>
</html>
