@if (brands.length > 0) {
  <section class="pb-12 px-6 md:px-10">
    <div class="max-w-[1440px] mx-auto" style="overflow-x:clip">

      <!-- Header -->
      <div class="flex items-end justify-between mb-6 gap-4">
        <div>
          <h2 class="font-display font-bold text-ink text-[clamp(22px,3vw,32px)] leading-tight mb-1">
            Nuestras marcas
          </h2>
          <p class="text-ink-mute text-sm">
            Trabajamos con los mejores fabricantes del mercado.
          </p>
        </div>
        <a routerLink="/catalogo"
          class="shrink-0 text-sm font-semibold text-ink underline-offset-2 hover:underline whitespace-nowrap">
          Ver todo →
        </a>
      </div>

      <!-- Scroll strip -->
      <div #scrollEl class="overflow-x-auto" style="scrollbar-width:none;-ms-overflow-style:none">
        <div class="flex gap-3 pb-3" style="width:max-content">
          @for (brand of brands; track brand.id; let i = $index) {
            <a routerLink="/catalogo" [queryParams]="{ marca: brand.code }"
              class="w-[110px] flex flex-col items-center gap-2 bg-white border border-rule rounded-2xl p-4 no-underline transition-all hover:shadow-md hover:-translate-y-0.5 group cursor-pointer">

              @if (firstImage(brand)) {
                <img [src]="firstImage(brand)!" [alt]="brand.name"
                  class="h-10 w-full object-contain" loading="lazy" />
              } @else {
                <div class="w-10 h-10 rounded-xl flex items-center justify-center text-white text-[10px] font-extrabold tracking-wider"
                  [style.background-color]="color(i)">
                  {{ brand.name.slice(0, 2).toUpperCase() }}
                </div>
              }

              <span class="font-display font-bold text-ink text-[11px] text-center leading-tight group-hover:text-coral transition-colors">
                {{ brand.name }}
              </span>

            </a>
          }
        </div>
      </div>

      <!-- Flechas desktop -->
      <div class="hidden md:flex justify-center gap-3 mt-4">
        <button type="button" (click)="scroll(-1)"
          class="flex items-center justify-center w-9 h-9 rounded-full border border-rule bg-white text-ink-mute hover:text-ink hover:border-ink/30 transition-colors cursor-pointer">
          <span class="material-symbols-outlined text-[20px] leading-none">chevron_left</span>
        </button>
        <button type="button" (click)="scroll(1)"
          class="flex items-center justify-center w-9 h-9 rounded-full border border-rule bg-white text-ink-mute hover:text-ink hover:border-ink/30 transition-colors cursor-pointer">
          <span class="material-symbols-outlined text-[20px] leading-none">chevron_right</span>
        </button>
      </div>

    </div>
  </section>
}
