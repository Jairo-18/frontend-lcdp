<!-- ── Compra por categoría ── -->
@if (categories().length > 0) {
  <section class="pb-12 px-6 md:px-10">
    <div class="max-w-[1440px] mx-auto" style="overflow-x: clip">
      <!-- Header -->
      <div class="flex items-end justify-between mb-6 gap-4">
        <div>
          <h2
            class="font-display font-bold text-ink text-[clamp(22px,3vw,32px)] leading-tight mb-1"
          >
            Compra por categoría
          </h2>
          <p class="text-ink-mute text-sm">
            Todo organizado para que encuentres lo que necesitas en segundos.
          </p>
        </div>
        <a
          routerLink="/catalogo"
          class="shrink-0 text-sm font-semibold text-ink underline-offset-2 hover:underline whitespace-nowrap"
        >
          Ver todo →
        </a>
      </div>

      <!-- Scroll strip -->
      <div
        #scrollEl
        class="overflow-x-auto"
        style="scrollbar-width: none; -ms-overflow-style: none"
      >
        <div class="flex gap-3 pb-3" style="width: max-content">
          @for (cat of categories(); track cat.id) {
            <a
              routerLink="/catalogo"
              [queryParams]="{ categoria: cat.code }"
              class="w-[120px] flex flex-col items-center gap-2 bg-white border border-rule rounded-2xl p-4 cursor-pointer no-underline transition-all hover:shadow-md hover:-translate-y-0.5 group"
            >
              @if (cat.images && cat.images.length > 0) {
                <img
                  [src]="cat.images[0].md"
                  [alt]="cat.name"
                  class="w-12 h-12 object-cover rounded-xl"
                  loading="lazy"
                />
              } @else {
                <div
                  class="w-12 h-12 rounded-xl bg-paper-alt flex items-center justify-center"
                >
                  <span
                    class="material-symbols-outlined text-[24px] text-ink-mute leading-none"
                    >category</span
                  >
                </div>
              }

              <span
                class="font-display font-bold text-ink text-[9px] md:text-[10px] text-center leading-tight group-hover:text-coral transition-colors"
              >
                {{ cat.name }}
              </span>
            </a>
          }
        </div>
      </div>

      <!-- Flechas desktop -->
      <div class="hidden md:flex justify-center gap-3 mt-4">
        <button
          type="button"
          (click)="scroll(-1)"
          class="flex items-center justify-center w-9 h-9 rounded-full border border-rule bg-white text-ink-mute hover:text-ink hover:border-ink/30 transition-colors cursor-pointer"
        >
          <span class="material-symbols-outlined text-[20px] leading-none"
            >chevron_left</span
          >
        </button>
        <button
          type="button"
          (click)="scroll(1)"
          class="flex items-center justify-center w-9 h-9 rounded-full border border-rule bg-white text-ink-mute hover:text-ink hover:border-ink/30 transition-colors cursor-pointer"
        >
          <span class="material-symbols-outlined text-[20px] leading-none"
            >chevron_right</span
          >
        </button>
      </div>
    </div>
  </section>
}
