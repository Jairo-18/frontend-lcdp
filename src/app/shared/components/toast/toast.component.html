<div class="fixed top-4 right-4 z-[9999] flex flex-col gap-2 w-80 pointer-events-none">
  @for (toast of toasts(); track toast.id) {
    <div
      class="pointer-events-auto flex items-start gap-3 rounded-xl px-4 py-3 shadow-lg text-sm font-medium transition-all duration-300 border"
      [class]="toastClasses(toast)"
    >
      <span class="material-symbols-outlined text-base leading-5 shrink-0">
        {{ toast.type === 'success' ? 'check_circle' : toast.type === 'error' ? 'cancel' : 'info' }}
      </span>
      <span class="flex-1 leading-5">{{ toast.message }}</span>
      <button
        class="shrink-0 opacity-60 hover:opacity-100 transition-opacity"
        (click)="remove(toast.id)"
      >
        <span class="material-symbols-outlined text-base leading-none">close</span>
      </button>
    </div>
  }
</div>
