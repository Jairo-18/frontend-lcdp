<article class="flex relative min-h-dvh">
  @if (isAdmin) {
    <app-admin-sidebar (exitAdmin)="onExitAdmin()" />
  }

  <div class="app-container flex-1 relative" [class.no-sidebar]="!isAdmin">
    @if (!isAdmin) {
      <app-nav-bar
        class="brand-nav-bar"
        [logoUrl]="_org()?.logoUrl ?? ''"
        [cartCount]="cartSvc.count()"
        (openCart)="cartOpen.set(true)"
      />
    }

    <main class="main w-full">
      <router-outlet />
    </main>

    @if (!isAdmin) {
      <app-footer [org]="_org()" />
    }
  </div>
</article>

<app-cart-drawer
  [isOpen]="cartOpen()"
  (close)="cartOpen.set(false)"
/>
