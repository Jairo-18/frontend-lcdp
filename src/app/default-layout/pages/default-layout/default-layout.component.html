<article class="flex relative min-h-dvh">
  @if (isAdmin) {
    <app-admin-sidebar (exitAdmin)="onExitAdmin()" />
  }

  <div class="app-container flex-1 relative">
    @if (!isAdmin) {
      <app-nav-bar class="brand-nav-bar" />
    }

    <main class="main w-full">
      <router-outlet />
    </main>

    @if (!isAdmin) {
      <app-footer [org]="_org()" />
    }
  </div>
</article>
