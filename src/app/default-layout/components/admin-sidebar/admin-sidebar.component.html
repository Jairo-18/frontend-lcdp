<aside class="admin-sidebar">

  <!-- Brand -->
  <div class="admin-brand">
    <div class="admin-logo">
      <img src="assets/logo.jpg" alt="La Casa del Pintor" />
    </div>
    <div>
      <div class="admin-brand-name">La Casa del Pintor</div>
      <div class="admin-brand-sub">Panel administrativo</div>
    </div>
  </div>

  <!-- Nav -->
  <nav class="admin-nav">
    <a
      *ngFor="let item of navItems"
      [routerLink]="item.route"
      routerLinkActive="active"
      class="admin-nav-item"
    >
      <span class="ic">{{ item.icon }}</span>
      {{ item.label }}
      <span *ngIf="item.count !== undefined" class="ct">{{ item.count }}</span>
    </a>
  </nav>

  <!-- Footer usuario -->
  <div class="admin-foot">
    <div class="admin-user">
      <div class="admin-avatar">{{ userInitials }}</div>
      <div>
        <div class="admin-user-name">{{ userName }}</div>
        <div class="admin-user-role">{{ userRole }}</div>
      </div>
    </div>
    <button class="admin-exit" (click)="exitAdmin.emit()">
      ← Volver a la tienda
    </button>
  </div>

</aside>
