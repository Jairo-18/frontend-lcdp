<header
  class="hidden lg:flex bg-paper/90 backdrop-blur-[14px] backdrop-saturate-[1.6] border-b border-rule-soft w-full items-center gap-6 px-8 py-3.5 justify-between"
>
  <!-- Brand → home -->
  <a routerLink="/"
    class="flex items-center gap-3 no-underline shrink-0"
  >
    <div
      class="w-11 h-11 rounded-xl bg-yellow grid place-items-center overflow-hidden shadow-sm shrink-0"
    >
      <img
        class="w-full h-full object-cover"
        [src]="logoUrl || 'assets/images/logo.jpg'"
        alt="Logo"
      />
    </div>
    <div
      class="font-display font-extrabold text-[17px] leading-none tracking-tight text-ink"
    >
      La Casa del
      <em
        class="not-italic font-hand text-coral text-[22px] font-semibold block leading-none mt-0.5"
        >Pintor</em
      >
    </div>
  </a>

  <!-- Search -->
  <div
    class="flex-1 max-w-[480px] flex items-center gap-2.5 px-4 py-2.5 bg-white border border-rule rounded-xl transition-all focus-within:border-ink focus-within:shadow-[0_0_0_3px_rgba(26,28,44,0.08)]"
  >
    <button type="button" (click)="goSearch()"
      class="bg-transparent border-0 p-0 cursor-pointer flex items-center text-ink-mute hover:text-ink transition-colors shrink-0">
      <span class="material-symbols-outlined text-[18px] leading-none">search</span>
    </button>
    <input
      class="border-0 outline-none bg-transparent flex-1 font-body text-sm text-ink"
      type="text"
      placeholder="Buscar productos, marcas…"
      [(ngModel)]="searchQuery"
      (keydown)="onSearchKeydown($event)"
    />
  </div>

  <!-- Nav links + Actions -->
  <div class="flex gap-1.5 items-center shrink-0">
    <a routerLink="/catalogo" routerLinkActive="bg-[rgba(26,28,44,0.06)] text-ink"
      class="px-3.5 py-2.5 rounded-lg inline-flex items-center gap-2 text-sm font-medium text-ink-soft transition-all hover:bg-[rgba(26,28,44,0.06)] hover:text-ink no-underline">
      <span class="material-symbols-outlined text-[18px] leading-none">format_paint</span>
      Catálogo
    </a>
    <a routerLink="/about-us" routerLinkActive="bg-[rgba(26,28,44,0.06)] text-ink"
      class="px-3.5 py-2.5 rounded-lg inline-flex items-center gap-2 text-sm font-medium text-ink-soft transition-all hover:bg-[rgba(26,28,44,0.06)] hover:text-ink no-underline">
      <span class="material-symbols-outlined text-[18px] leading-none">info</span>
      Nosotros
    </a>

    <a routerLink="/auth/login"
      class="ml-2 bg-ink text-white px-[18px] py-2.5 rounded-lg inline-flex items-center gap-2 text-sm font-medium no-underline transition-all hover:bg-black">
      <span class="material-symbols-outlined text-[18px] leading-none">manage_accounts</span>
      Admin
    </a>

    <button
      class="bg-ink text-white px-[18px] py-2.5 rounded-lg inline-flex items-center gap-2 text-sm font-medium cursor-pointer border-0 transition-all hover:bg-black"
      (click)="openCart.emit()"
    >
      <span class="material-symbols-outlined text-[18px] leading-none">shopping_bag</span>
      Carrito
      <span
        *ngIf="cartCount > 0"
        class="bg-yellow text-ink font-mono font-bold text-[11px] min-w-[20px] h-5 rounded-full inline-grid place-items-center px-1.5"
      >
        {{ cartCount }}
      </span>
    </button>
  </div>
</header>
