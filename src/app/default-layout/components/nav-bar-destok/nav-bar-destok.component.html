<header
  class="hidden lg:flex bg-paper/90 backdrop-blur-[14px] backdrop-saturate-[1.6] border-b border-rule-soft w-[80%] mx-auto items-center gap-6 px-6 py-3.5 justify-center"
>
  <!-- Brand -->
  <button
    class="flex items-center gap-3 bg-transparent border-0 cursor-pointer p-0"
    (click)="goHome.emit()"
  >
    <div
      class="w-11 h-11 rounded-xl bg-yellow grid place-items-center overflow-hidden shadow-sm shrink-0"
    >
      <img
        class="w-full h-full object-cover"
        [src]="logoUrl || 'assets/images/logo.jpg'"
        alt="Logo"
      />
    </div>
    <div
      class="font-display font-extrabold text-[17px] leading-none tracking-tight text-ink"
    >
      La Casa del
      <em
        class="not-italic font-hand text-coral text-[22px] font-semibold block leading-none mt-0.5"
        >Pintor</em
      >
    </div>
  </button>

  <!-- Search -->
  <div
    class="flex-1 max-w-[480px] hidden sm:flex items-center gap-2.5 px-4 py-2.5 bg-white border border-rule rounded-xl transition-all focus-within:border-ink focus-within:shadow-[0_0_0_3px_rgba(26,28,44,0.08)]"
  >
    <span class="material-symbols-outlined text-[18px] text-ink-mute shrink-0"
      >search</span
    >
    <input
      class="border-0 outline-none bg-transparent flex-1 font-body text-sm text-ink"
      type="text"
      placeholder="Buscar productos, marcas…"
      [(ngModel)]="searchQuery"
      (ngModelChange)="onSearch()"
    />
  </div>

  <!-- Actions -->
  <div class="ml-auto flex gap-1.5 items-center">
    <button
      class="bg-transparent border-0 px-3.5 py-2.5 rounded-lg inline-flex items-center gap-2 text-sm font-medium text-ink-soft cursor-pointer transition-all hover:bg-[rgba(26,28,44,0.06)] hover:text-ink"
      (click)="goAdmin.emit()"
    >
      <span class="material-symbols-outlined text-[18px] leading-none"
        >format_paint</span
      >
      Catálogo
    </button>
    <button
      class="bg-transparent border-0 px-3.5 py-2.5 rounded-lg inline-flex items-center gap-2 text-sm font-medium text-ink-soft cursor-pointer transition-all hover:bg-[rgba(26,28,44,0.06)] hover:text-ink"
      (click)="goAdmin.emit()"
    >
      <span class="material-symbols-outlined text-[18px] leading-none"
        >smart_display</span
      >
      Videos
    </button>

    <button
      class="bg-ink text-white px-[18px] py-2.5 rounded-lg inline-flex items-center gap-2 text-sm font-medium cursor-pointer border-0 transition-all hover:bg-black"
      routerLink="/auth/login"
    >
      <span class="material-symbols-outlined text-[18px] leading-none"
        >manage_accounts</span
      >
      Admin
    </button>

    <button
      class="bg-ink text-white px-[18px] py-2.5 rounded-lg inline-flex items-center gap-2 text-sm font-medium cursor-pointer border-0 transition-all hover:bg-black"
      (click)="openCart.emit()"
    >
      <span class="material-symbols-outlined text-[18px] leading-none"
        >shopping_bag</span
      >
      Carrito
      <span
        *ngIf="cartCount > 0"
        class="bg-yellow text-ink font-mono font-bold text-[11px] min-w-[20px] h-5 rounded-full inline-grid place-items-center px-1.5"
      >
        {{ cartCount }}
      </span>
    </button>
  </div>
</header>
