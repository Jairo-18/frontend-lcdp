<header class="header">
  <div class="header-inner">

    <!-- Brand -->
    <button class="brand" (click)="goHome.emit()">
      <div class="brand-logo">
        <img src="assets/logo.jpg" alt="Logo" />
      </div>
      <div class="brand-name">
        La Casa del
        <em>Pintor</em>
      </div>
    </button>

    <!-- Search -->
    <div class="nav-search">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input
        type="text"
        placeholder="Buscar productos, marcas…"
        [(ngModel)]="searchQuery"
        (ngModelChange)="onSearch()"
      />
    </div>

    <!-- Actions -->
    <div class="nav-actions">
      <button class="nav-btn" (click)="goAdmin.emit()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 2a10 10 0 1 0 0 20A10 10 0 0 0 12 2z"/>
          <path d="M12 8v4l3 3"/>
        </svg>
        Admin
      </button>

      <button class="nav-btn cart" (click)="openCart.emit()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/>
          <line x1="3" y1="6" x2="21" y2="6"/>
          <path d="M16 10a4 4 0 0 1-8 0"/>
        </svg>
        Carrito
        <span class="cart-count" *ngIf="cartCount > 0">{{ cartCount }}</span>
      </button>
    </div>

  </div>

  <!-- Category subnav -->
  <nav class="subnav" *ngIf="categories.length > 0">
    <div class="subnav-inner">
      <button
        class="subnav-pill"
        [class.active]="activeCategory === null"
        (click)="selectCategory.emit(null)"
      >
        Todos
      </button>
      <button
        *ngFor="let cat of categories"
        class="subnav-pill"
        [class.active]="activeCategory === cat.id"
        (click)="selectCategory.emit(cat.id)"
      >
        <span class="ic">{{ cat.icon }}</span>
        {{ cat.name }}
      </button>
    </div>
  </nav>

</header>
